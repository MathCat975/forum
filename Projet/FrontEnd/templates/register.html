<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/chrome.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
    <site-header title="Forum" subtitle="Register"></site-header>

    <main class="auth">
        <section class="auth-card" aria-label="Register">
            <header class="auth-head">
                <h1 class="auth-title">Create your account</h1>
                <p class="auth-sub">Register to join the conversation.</p>
            </header>

            <nav class="auth-tabs" aria-label="Auth pages">
                <a class="auth-tab" href="./login.html">Login</a>
                <a class="auth-tab" href="./register.html" aria-current="page">Register</a>
            </nav>

            <div class="auth-body">
                <form class="auth-form">
                    <div class="field">
                        <label for="username">Username</label>
                        <input id="username" name="username" type="text" placeholder="yourname" autocomplete="username" required>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required>
                    </div>

                    <div class="auth-actions">
                        <button class="btn btn--primary" type="submit">Register</button>
                        <a class="muted-link" href="./login.html">Already have an account?</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <site-footer title="Forum"></site-footer>
    <script src="../assets/js/chrome.js" defer></script>
</body>
</html>
